<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARROOM — Trading Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── TOKENS ───────────────────────────────────────── */
:root {
  --bg:       #07080d;
  --surface:  #0d0f18;
  --surface2: #12151f;
  --surface3: #181c28;
  --border:   #1e2535;
  --amber:    #f59e0b;
  --amber2:   #fbbf24;
  --amber-dim:#7c4f06;
  --green:    #22c55e;
  --red:      #ef4444;
  --blue:     #3b82f6;
  --muted:    #3d4a5e;
  --muted2:   #5a6a80;
  --text:     #c8d6e8;
  --text2:    #8899aa;
  --grid-col: rgba(30,37,53,0.8);
  --bracket:  #f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Courier New',Courier,monospace;color:var(--text)}

/* ── SCANLINES OVERLAY ────────────────────────────── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
}

/* ── INFINITE CANVAS ──────────────────────────────── */
#stage{
  position:fixed;inset:0;
  background-color:var(--bg);
  background-image:
    linear-gradient(var(--grid-col) 1px,transparent 1px),
    linear-gradient(90deg,var(--grid-col) 1px,transparent 1px),
    linear-gradient(rgba(30,37,53,.3) 1px,transparent 1px),
    linear-gradient(90deg,rgba(30,37,53,.3) 1px,transparent 1px);
  background-size:80px 80px,80px 80px,20px 20px,20px 20px;
  cursor:crosshair;overflow:hidden;
}
#stage.panning{cursor:grabbing}
#world{position:absolute;width:7000px;height:5000px;transform-origin:0 0}

/* ── TOPBAR ───────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;height:48px;
  background:rgba(7,8,13,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:16px;padding:0 18px;
}
.logo{
  font-size:15px;font-weight:700;letter-spacing:5px;
  color:var(--amber);text-shadow:0 0 24px rgba(245,158,11,.4);
}
.logo sub{font-size:8px;letter-spacing:2px;color:var(--muted2);vertical-align:middle;margin-left:6px}
.sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.tag{
  font-size:9px;letter-spacing:2px;padding:3px 9px;
  border:1px solid var(--border);border-radius:2px;
  color:var(--muted2);background:var(--surface);cursor:pointer;
  transition:all .15s;text-transform:uppercase;
}
.tag:hover,.tag.on{border-color:var(--amber);color:var(--amber);background:rgba(245,158,11,.07)}
.tag.green-tag{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.07)}
.tag.red-tag{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.07)}
#sys-status{margin-left:auto;font-size:9px;letter-spacing:2px;color:var(--muted);display:flex;align-items:center;gap:6px}
#sys-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .3s}
#sys-dot.live{background:var(--green);box-shadow:0 0 8px var(--green)}

/* ── ZOOM HUD ─────────────────────────────────────── */
#hud-zoom{
  position:fixed;bottom:20px;right:20px;z-index:200;
  display:flex;flex-direction:column;gap:3px;align-items:center;
}
.hud-btn{
  width:30px;height:30px;background:var(--surface2);
  border:1px solid var(--border);color:var(--text2);
  font-size:14px;border-radius:2px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;font-family:inherit;
}
.hud-btn:hover{border-color:var(--amber);color:var(--amber)}
#zoom-pct{font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px}

/* ── WIDGET SHELL ─────────────────────────────────── */
.w{
  position:absolute;
  background:var(--surface);
  display:flex;flex-direction:column;
  transition:box-shadow .2s;
  user-select:none;
}
/* bracket corners */
.w::before,.w::after{
  content:'';position:absolute;
  width:12px;height:12px;
  border-color:var(--bracket);border-style:solid;
  opacity:.6;transition:opacity .2s;
}
.w::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.w::after{top:-1px;right:-1px;border-width:2px 2px 0 0}
.w .w-bl::before,.w .w-br::before{content:'';position:absolute;width:12px;height:12px;border-color:var(--bracket);border-style:solid}
.corner-bl{position:absolute;bottom:-1px;left:-1px;width:12px;height:12px;border:2px solid var(--bracket);border-top:none;border-right:none;opacity:.6}
.corner-br{position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border:2px solid var(--bracket);border-top:none;border-left:none;opacity:.6}
.w:hover::before,.w:hover::after,.w:hover .corner-bl,.w:hover .corner-br{opacity:1}
.w.dragging{box-shadow:0 0 0 1px var(--amber),0 20px 60px rgba(245,158,11,.15);z-index:99!important}

.w-head{
  display:flex;align-items:center;gap:8px;
  padding:9px 12px 7px;
  border-bottom:1px solid var(--border);
  cursor:move;flex-shrink:0;
}
.w-id{font-size:8px;letter-spacing:3px;color:var(--amber-dim);min-width:28px}
.w-title{font-size:9px;letter-spacing:2.5px;color:var(--muted2);text-transform:uppercase;flex:1}
.w-status{font-size:8px;letter-spacing:1px;color:var(--muted)}

.w-body{flex:1;overflow:hidden;padding:12px}
.w-body.p0{padding:0}
.w-body.scroll{overflow-y:auto}
.w-body.scroll::-webkit-scrollbar{width:3px}
.w-body.scroll::-webkit-scrollbar-track{background:transparent}
.w-body.scroll::-webkit-scrollbar-thumb{background:var(--border)}

/* ── STAT BLOCKS ──────────────────────────────────── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-row.x4{grid-template-columns:1fr 1fr 1fr 1fr}
.stat-block{background:var(--surface2);padding:10px 12px;border-left:2px solid var(--border)}
.stat-block.amber{border-color:var(--amber)}
.stat-block.green{border-color:var(--green)}
.stat-block.red{border-color:var(--red)}
.stat-block.blue{border-color:var(--blue)}
.s-lbl{font-size:8px;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;margin-bottom:5px}
.s-val{font-size:20px;font-weight:700;line-height:1;color:var(--text)}
.s-val.amber{color:var(--amber)}
.s-val.green{color:var(--green)}
.s-val.red{color:var(--red)}
.s-val.blue{color:var(--blue)}
.s-sub{font-size:9px;color:var(--muted2);margin-top:3px}

/* ── TABLE ────────────────────────────────────────── */
.tbl{width:100%;border-collapse:collapse;font-size:10px}
.tbl th{
  font-size:8px;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;
  padding:5px 10px;border-bottom:1px solid var(--border);text-align:left;
  background:var(--surface2);position:sticky;top:0;
}
.tbl td{padding:6px 10px;border-bottom:1px solid rgba(30,37,53,.5);color:var(--text2)}
.tbl tr:hover td{background:rgba(245,158,11,.03);color:var(--text)}
.tbl tr:last-child td{border-bottom:none}
.tkr{font-size:11px;font-weight:700;color:var(--amber);letter-spacing:1px}
.badge{font-size:8px;padding:2px 6px;letter-spacing:1px;border-radius:1px}
.badge.GREEN{background:rgba(34,197,94,.15);color:var(--green)}
.badge.RED{background:rgba(239,68,68,.15);color:var(--red)}
.badge.OPEN{background:rgba(245,158,11,.15);color:var(--amber)}
.badge.PENDING{background:rgba(59,130,246,.12);color:var(--blue)}
.badge.EXPIRED{background:rgba(93,93,93,.15);color:var(--muted2)}
.pos{color:var(--green)}
.neg{color:var(--red)}
.phase-lbl{font-size:8px;padding:2px 5px;background:rgba(245,158,11,.08);color:var(--amber-dim);letter-spacing:1px}

/* ── HEAT GRID ────────────────────────────────────── */
.heat-grid{display:grid;grid-template-columns:28px repeat(12,1fr);gap:2px}
.hg-lbl{font-size:8px;color:var(--muted);display:flex;align-items:center;justify-content:flex-end;padding-right:4px}
.hg-head{font-size:7px;color:var(--muted);text-align:center;letter-spacing:.5px}
.hg-cell{aspect-ratio:1;border-radius:1px;cursor:pointer;transition:transform .1s}
.hg-cell:hover{transform:scale(1.2);z-index:2;position:relative}

/* ── OPEN POSITIONS ───────────────────────────────── */
.pos-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid rgba(30,37,53,.4)}
.pos-row:last-child{border-bottom:none}
.pos-tkr{font-size:12px;font-weight:700;color:var(--amber);width:56px;letter-spacing:1px}
.pos-dir{font-size:8px;letter-spacing:1px;width:42px;color:var(--muted2)}
.pos-bar-outer{flex:1;height:3px;background:var(--surface3);border-radius:1px}
.pos-bar-inner{height:100%;border-radius:1px;transition:width .4s}
.pos-r{font-size:10px;font-weight:700;width:50px;text-align:right}

/* ── PENDING POSITIONS ────────────────────────────── */
.pend-row{display:flex;align-items:center;gap:6px;padding:6px 12px;border-bottom:1px solid rgba(30,37,53,.4)}
.pend-row:last-child{border-bottom:none}
.pend-tkr{font-size:11px;font-weight:700;color:var(--amber);width:52px;letter-spacing:1px}
.pend-dir{font-size:8px;letter-spacing:1px;width:38px}
.pend-lbl{font-size:7px;color:var(--muted2);text-align:right;letter-spacing:.5px}
.pend-val{font-size:10px;font-weight:700;color:var(--text);text-align:right}
.pend-col{display:flex;flex-direction:column;gap:1px;flex:1}
.pos-entry{font-size:9px;color:var(--muted);width:56px;text-align:right}

/* ── R BARS ───────────────────────────────────────── */
.r-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.r-key{font-size:9px;color:var(--muted2);width:32px;text-align:right;flex-shrink:0}
.r-outer{flex:1;height:8px;background:var(--surface3);border-radius:1px;overflow:hidden}
.r-inner{height:100%;border-radius:1px;transition:width .5s}
.r-count{font-size:9px;color:var(--muted);width:24px}

/* ── PHASE TABLE ──────────────────────────────────── */
.ph-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid rgba(30,37,53,.4)}
.ph-row:last-child{border-bottom:none}
.ph-name{font-size:9px;color:var(--amber);letter-spacing:1px;flex:1}
.ph-bar-outer{width:80px;height:4px;background:var(--surface3);border-radius:1px;overflow:hidden}
.ph-bar-inner{height:100%;border-radius:1px}
.ph-wr{font-size:10px;font-weight:700;width:36px;text-align:right}
.ph-pnl{font-size:10px;width:60px;text-align:right}
.ph-ct{font-size:9px;color:var(--muted);width:20px;text-align:right}

/* ── EMPTY ────────────────────────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:8px;color:var(--muted);font-size:10px;letter-spacing:1px;text-align:center;padding:20px}
.empty span{font-size:22px;opacity:.3}

/* ── TOOLTIP ──────────────────────────────────────── */
#tip{
  position:fixed;z-index:9000;pointer-events:none;opacity:0;
  background:var(--surface3);border:1px solid var(--border);
  padding:5px 10px;font-size:10px;color:var(--text);letter-spacing:.5px;
  border-radius:1px;white-space:nowrap;transition:opacity .1s;
}

/* ── LOADING BAR ──────────────────────────────────── */
#load-bar{
  position:fixed;top:48px;left:0;right:0;z-index:300;height:2px;
  background:linear-gradient(90deg,var(--amber),var(--amber2));
  transform:scaleX(0);transform-origin:left;transition:transform .4s;
}
</style>
</head>
<body>

<div id="load-bar"></div>

<div id="topbar">
  <div class="logo">WARROOM <sub>TRADING OPS</sub></div>
  <div class="sep"></div>
  <div class="tag on" id="tag-all" onclick="setPhase(null)">ALL OPS</div>
  <div class="sep"></div>
  <div id="sys-status"><div id="sys-dot"></div><span id="sys-txt">CONNECTING</span></div>
</div>

<div id="stage">
  <div id="world"></div>
</div>

<div id="hud-zoom">
  <button class="hud-btn" id="z+">+</button>
  <button class="hud-btn" id="z-">−</button>
  <button class="hud-btn" id="z0" title="Reset">⌂</button>
  <div id="zoom-pct">100%</div>
</div>

<div id="tip"></div>

<script>
// ══════════════════════════════════════════════════
// SUPABASE
// ══════════════════════════════════════════════════
const SB_URL  = 'https://gbllwxllntnncfrqdhhr.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdibGx3eGxsbnRubmNmcnFkaGhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjYwNzgsImV4cCI6MjA4OTAwMjA3OH0.5iaPEmI_2bb4Nnz8LC7CJxuCGZCBfQ5IKddXKnkbo10';
const sb = supabase.createClient(SB_URL, SB_KEY);

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let allTrades    = [];
let allCapital   = [];
let allChecks    = [];   // daily_checks: {trade_id, checked_at, day_close}
let activePhase  = null;
let charts       = {};
const world      = document.getElementById('world');

// ── FINNHUB LIVE PRICES ───────────────────────────
const FINNHUB_KEY  = 'd7f2ha1r01qi33g85oqgd7f2ha1r01qi33g85or0';
const livePrice    = {};  // ticker → precio actual
const livePrevClose= {};  // ticker → cierre anterior
let   finnhubTimer = null;

// ══════════════════════════════════════════════════
// CANVAS: PAN + ZOOM
// ══════════════════════════════════════════════════
let pan={x:60,y:62}, zoom=1, panning=false, ps={x:0,y:0};

function applyXform(){
  world.style.transform=`translate(${pan.x}px,${pan.y}px) scale(${zoom})`;
  document.getElementById('zoom-pct').textContent=Math.round(zoom*100)+'%';
}
applyXform();

const stage=document.getElementById('stage');
stage.addEventListener('mousedown',e=>{
  if(e.target!==stage&&e.target!==world)return;
  panning=true; stage.classList.add('panning');
  ps={x:e.clientX-pan.x,y:e.clientY-pan.y};
});
window.addEventListener('mousemove',e=>{
  if(!panning)return;
  pan={x:e.clientX-ps.x,y:e.clientY-ps.y};
  applyXform();
});
window.addEventListener('mouseup',()=>{panning=false;stage.classList.remove('panning')});
stage.addEventListener('wheel',e=>{
  // If cursor is inside a scrollable widget body, scroll it instead of zooming
  const scrollEl=e.target.closest('.w-body.scroll');
  if(scrollEl){e.stopPropagation();scrollEl.scrollTop+=e.deltaY;return;}
  e.preventDefault();
  const dz=-e.deltaY*.001;
  const nz=Math.min(2.5,Math.max(.2,zoom+dz));
  const r=stage.getBoundingClientRect();
  pan.x=e.clientX-r.left-(e.clientX-r.left-pan.x)*(nz/zoom);
  pan.y=e.clientY-r.top-(e.clientY-r.top-pan.y)*(nz/zoom);
  zoom=nz; applyXform();
},{passive:false});
document.getElementById('z+').onclick=()=>{zoom=Math.min(2.5,zoom+.1);applyXform()};
document.getElementById('z-').onclick=()=>{zoom=Math.max(.2,zoom-.1);applyXform()};
document.getElementById('z0').onclick=()=>{pan={x:60,y:62};zoom=1;applyXform()};

// ══════════════════════════════════════════════════
// WIDGET DRAG
// ══════════════════════════════════════════════════
let dragging=null,doff={x:0,y:0};
function makeDraggable(el){
  const hd=el.querySelector('.w-head');
  if(!hd)return;
  hd.addEventListener('mousedown',e=>{
    e.stopPropagation();
    dragging=el; el.classList.add('dragging');
    const r=el.getBoundingClientRect();
    doff={x:(e.clientX-r.left)/zoom,y:(e.clientY-r.top)/zoom};
  });
}
window.addEventListener('mousemove',e=>{
  if(!dragging)return;
  dragging.style.left=(e.clientX-pan.x)/zoom-doff.x+'px';
  dragging.style.top=(e.clientY-pan.y)/zoom-doff.y+'px';
});
window.addEventListener('mouseup',()=>{if(dragging){dragging.classList.remove('dragging');dragging=null}});

// ══════════════════════════════════════════════════
// WIDGET FACTORY
// ══════════════════════════════════════════════════
let widgetZ=10;
function widget({id,num,title,status='',x,y,w,h,bodyClass=''}){
  let el=document.getElementById(id);
  if(!el){el=document.createElement('div');el.className='w';el.id=id;world.appendChild(el);}
  el.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${widgetZ++};`;
  el.innerHTML=`
    <div class="w-head">
      <span class="w-id">${String(num).padStart(2,'0')}</span>
      <span class="w-title">${title}</span>
      ${status?`<span class="w-status">${status}</span>`:''}
    </div>
    <div class="w-body${bodyClass?' '+bodyClass:''}" id="${id}-body"></div>
    <div class="corner-bl"></div><div class="corner-br"></div>`;
  makeDraggable(el);
  return document.getElementById(id+'-body');
}

// ══════════════════════════════════════════════════
// LOAD DATA
// ══════════════════════════════════════════════════
async function loadData(){
  setBar(.1);
  const [t1,t2,t3]=await Promise.all([
    sb.from('trades').select('*').order('recommended_at',{ascending:false}),
    sb.from('capital_invertido').select('*').order('fecha',{ascending:true}),
    sb.from('daily_checks').select('trade_id,checked_at,day_close,day_high,day_low').order('checked_at',{ascending:true}),
  ]);
  setBar(1);
  if(t1.error||t2.error){setStatus('ERROR','red');return;}

  allTrades  = (t1.data||[]).map(t=>({...t, status:(t.status||'').toUpperCase().trim()}));
  allCapital = t2.data||[];
  allChecks  = t3.data||[];

  const phases=[...new Set(allTrades.map(t=>t.phase||'—').filter(Boolean))].sort();
  const bar=document.getElementById('topbar');
  bar.querySelectorAll('.phase-dyn').forEach(p=>p.remove());
  phases.forEach(ph=>{
    const p=document.createElement('div');
    p.className='tag phase-dyn';p.textContent=ph;
    p.onclick=()=>setPhase(activePhase===ph?null:ph);
    bar.insertBefore(p,document.getElementById('sys-status'));
  });

  setStatus(`${allTrades.length} OPS LOADED`,'live');
  renderAll();
  startFinnhubPolling();
}

function setPhase(ph){
  activePhase=ph;
  document.getElementById('tag-all').classList.toggle('on',!ph);
  document.querySelectorAll('.phase-dyn').forEach(el=>el.classList.toggle('on',el.textContent===ph));
  renderAll();
}

function T(){
  if(!activePhase)return allTrades;
  return allTrades.filter(t=>(t.phase||'—')===activePhase);
}
function CL(){return T().filter(t=>t.status==='GREEN'||t.status==='RED')}
function OP(){return T().filter(t=>t.status==='OPEN')}
function PE(){return T().filter(t=>t.status==='PENDING')}

// ══════════════════════════════════════════════════
// FINNHUB POLLING
// ══════════════════════════════════════════════════
function startFinnhubPolling(){
  if(finnhubTimer) clearInterval(finnhubTimer);
  const tickers=[...new Set(OP().map(t=>t.ticker).filter(Boolean))];
  if(!tickers.length) return;

  async function fetchAll(){
    for(const tk of tickers){
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${tk}&token=${FINNHUB_KEY}`);
        const d=await r.json();
        if(d&&d.c){livePrice[tk]=d.c; livePrevClose[tk]=d.pc;}
      }catch(e){}
    }
    // Update Active Positions widget
    renderOpen();
    // Update detail panel live bar if open
    const det=document.getElementById('w-detail');
    if(det){
      const tk=det.dataset.ticker;
      const lp=livePrice[tk], pc=livePrevClose[tk];
      const priceEl=det.querySelector('#detail-live-price');
      const todayEl=det.querySelector('#detail-live-today');
      if(priceEl&&lp) priceEl.textContent='€'+fmtP(lp);
      if(todayEl&&lp&&pc){
        const chg=lp-pc, pct=chg/pc*100;
        todayEl.innerHTML='<span style="color:var(--text)">'+fmtEur(chg,2)+' ('+(pct>=0?'+':'')+pct.toFixed(2)+'%)</span> hoy';
      }
    }
  }

  fetchAll();
  finnhubTimer=setInterval(fetchAll,60000);
}

// ══════════════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════════════
function renderAll(){
  renderOverview();
  renderEquity();
  renderOpen();
  renderLog();
  renderHeatmap();
  renderRBars();
  renderPending();
  renderPhases();
}

// ── 01 OVERVIEW ──────────────────────────────────
function renderOverview(){
  const b=widget({id:'w01',num:1,title:'COMMAND OVERVIEW',x:0,y:0,w:680,h:178});
  const cl=CL(),op=OP(),pe=PE();
  const totalR=cl.reduce((s,t)=>s+(+t.r_multiple||0),0);
  const wr=cl.length?cl.filter(t=>t.status==='GREEN').length/cl.length*100:0;
  const wins=cl.filter(t=>t.status==='GREEN');
  const loss=cl.filter(t=>t.status==='RED');
  const totalPnL=totalPortfolioPnL();

  // Expectancy: average monetary P&L per closed trade
  const pnlValues=cl.map(t=>tradePnL(t)).filter(v=>v!==null);
  const expectancy=pnlValues.length?pnlValues.reduce((s,v)=>s+v,0)/pnlValues.length:null;

  // Capital en riesgo: sum of invested_amount for open trades
  const capitalRiesgo=op.reduce((s,t)=>s+(+t.invested_amount||0),0);

  // Disponible: total capital (capital_invertido) − open − pending
  const totalCapital=allCapital.reduce((s,c)=>s+(+c.monto||0),0);
  const pendingInvested=pe.reduce((s,t)=>s+(+t.invested_amount||0),0);
  const disponible=totalCapital-capitalRiesgo-pendingInvested;

  b.innerHTML=`<div class="stat-row x4" style="height:100%">
    <div class="stat-block amber">
      <div class="s-lbl">Closed R</div>
      <div class="s-val amber">${totalR>=0?'+':''}${totalR.toFixed(2)}R</div>
      <div class="s-sub">${cl.length} ops closed</div>
    </div>
    <div class="stat-block ${wr>=50?'green':'red'}">
      <div class="s-lbl">Win Rate</div>
      <div class="s-val ${wr>=50?'green':'red'}">${wr.toFixed(1)}%</div>
      <div class="s-sub">${wins.length}W · ${loss.length}L</div>
    </div>
    <div class="stat-block blue">
      <div class="s-lbl">Capital en Riesgo</div>
      <div class="s-val blue" style="font-size:16px">${capitalRiesgo?'€'+Math.round(capitalRiesgo).toLocaleString('es-ES'):'—'}</div>
      <div class="s-sub" style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:8px;color:var(--muted2);letter-spacing:1px">EXPECTANCY</span>
        <span style="font-size:11px;font-weight:700;color:${expectancy===null?'var(--muted2)':expectancy>=0?'var(--green)':'var(--red)'}">${expectancy===null?'—':fmtEur(expectancy,2)+'/op'}</span>
      </div>
      <div class="s-sub" style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:8px;color:var(--muted2);letter-spacing:1px">DISPONIBLE</span>
        <span style="font-size:11px;font-weight:700;color:${disponible>=0?'var(--text)':'var(--red)'}">${'€'+Math.round(disponible).toLocaleString('es-ES')}</span>
      </div>
      <div class="s-sub" style="display:flex;justify-content:space-between;margin-top:4px">
        <span style="font-size:8px;color:var(--muted2);letter-spacing:1px">PENDING</span>
        <span style="font-size:11px;font-weight:700;color:var(--muted2)">${pendingInvested?'€'+Math.round(pendingInvested).toLocaleString('es-ES'):'—'}</span>
      </div>
    </div>
    <div class="stat-block ${totalPnL===null?'blue':totalPnL>=0?'green':'red'}">
      <div class="s-lbl">Total P&amp;L</div>
      <div class="s-val ${totalPnL===null?'blue':totalPnL>=0?'green':'red'}">${totalPnL===null?'—':fmtEur(totalPnL,2)}</div>

    </div>
  </div>`;

// ── 02 EQUITY CURVE ───────────────────────────────
// Mismo loop día a día que totalPortfolioPnL — muestra portfolio−capital por día
function renderEquity(){
  const b=widget({id:'w02',num:2,title:'EQUITY CURVE — PORTFOLIO VALUE',x:690,y:0,w:740,h:210,bodyClass:'p0'});

  const tradesWithInv=allTrades.filter(t=>
    t.invested_amount!=null&&+t.invested_amount>0&&
    t.entry_price!=null&&+t.entry_price>0
  );
  if(!allCapital.length&&!tradesWithInv.length){
    b.innerHTML='<div class="empty"><span>📈</span>AWAITING DATA</div>';return;
  }

  function pd(s){if(!s)return null;const p=s.substring(0,10).split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
  const today=new Date();today.setHours(0,0,0,0);

  let firstDate=new Date(today);
  for(const c of allCapital){const d=pd(c.fecha);if(d&&d<firstDate)firstDate=d;}
  for(const t of tradesWithInv){const d=pd(t.recommended_at);if(d&&d<firstDate)firstDate=d;}

  const capEntries=allCapital.map(c=>({date:pd(c.fecha),monto:+c.monto}));
  const tradeInfo=tradesWithInv.map(t=>{
    const numShares=+t.invested_amount/+t.entry_price;
    const openDate=pd(t.recommended_at);
    const closeDate=t.closed_at?pd(t.closed_at):null;
    const parsedChecks=allChecks
      .filter(c=>c.trade_id===t.id)
      .map(c=>({date:pd(c.checked_at),close:+c.day_close}))
      .sort((a,b)=>a.date-b.date);
    return{...t,numShares,openDate,closeDate,parsedChecks};
  });

  function isOpenOnDay(t,day){
    if(!t.openDate||t.openDate>day)return false;
    const isClosed=t.status==='GREEN'||t.status==='RED';
    if(!isClosed)return true;
    if(!t.closeDate)return true;
    return t.closeDate>day;
  }
  function getLatestClose(t,day){
    const valid=t.parsedChecks.filter(c=>c.date&&c.date<=day);
    return valid.length?valid[valid.length-1].close:+t.entry_price;
  }

  const labels=[],data=[];
  const cutoff=new Date(2026,2,13); // 13 marzo 2026 — no mostrar antes

  for(let d=new Date(firstDate);d<=today;d.setDate(d.getDate()+1)){
    const cur=new Date(d);
    if(cur.getDay()===0||cur.getDay()===6)continue;

    let capital=0;
    for(const ce of capEntries){if(ce.date&&ce.date<=cur)capital+=ce.monto;}

    let realizedPnL=0;
    for(const t of tradeInfo){
      if(!t.closeDate||t.closeDate>cur)continue;
      if(t.openDate>cur)continue;
      if((t.status==='GREEN'||t.status==='RED')&&t.close_price!=null){
        const dir=(t.direction||'BULLISH').toUpperCase();
        realizedPnL+=dir==='BEARISH'
          ?t.numShares*(+t.entry_price-+t.close_price)
          :t.numShares*(+t.close_price-+t.entry_price);
      }
    }

    const openTrades=tradeInfo.filter(t=>isOpenOnDay(t,cur));
    const lockedMoney=openTrades.reduce((s,t)=>s+(+t.invested_amount),0);
    const openValue=openTrades.reduce((s,t)=>{
      const latest=getLatestClose(t,cur);
      const dir=(t.direction||'BULLISH').toUpperCase();
      return s+(dir==='BEARISH'?t.numShares*(2*+t.entry_price-latest):t.numShares*latest);
    },0);

    const portfolio=capital+realizedPnL-lockedMoney+openValue;
    if(cur>=cutoff){
      labels.push(cur.toLocaleDateString('es-ES',{day:'numeric',month:'short'}));
      data.push(+(portfolio-capital).toFixed(2));
    }
  }

  if(!data.length){b.innerHTML='<div class="empty"><span>📈</span>SIN DATOS</div>';return;}

  const last=data[data.length-1];
  b.style.padding='8px 10px';
  b.innerHTML='<canvas id="c-eq"></canvas>';
  if(charts.eq){charts.eq.destroy();delete charts.eq;}

  const color=last>=0?'#22c55e':'#ef4444';
  const ctx=document.getElementById('c-eq').getContext('2d');
  charts.eq=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{
      data,borderColor:color,borderWidth:1.5,fill:true,
      backgroundColor:c=>{const g=c.chart.ctx.createLinearGradient(0,0,0,160);g.addColorStop(0,last>=0?'rgba(34,197,94,.22)':'rgba(239,68,68,.22)');g.addColorStop(1,'rgba(0,0,0,0)');return g},
      tension:.3,pointRadius:0,pointHoverRadius:3,
    }]},
    options:{
      animation:false,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,
        callbacks:{label:c=>{const v=c.raw;return ` ${v>=0?'+':'-'}€${Math.abs(v).toFixed(2)}`}}
      }},
      scales:{
        x:{ticks:{color:'#3d4a5e',font:{size:8,family:'Courier New'},maxTicksLimit:10},grid:{display:false},border:{display:false}},
        y:{
          grid:{color:'rgba(30,37,53,.6)'},
          ticks:{color:'#3d4a5e',font:{size:8,family:'Courier New'},
            callback:v=>(v>=0?'+':'')+'€'+Math.round(v)
          },
          border:{display:false}
        }
      }
    }
  });
}

// ── 05 MONTHLY P&L HEATMAP ────────────────────────
function renderHeatmap(){
  const b=widget({id:'w05',num:5,title:'MONTHLY P&L HEATMAP',x:0,y:532,w:600,h:280});
  const cl=CL().filter(t=>t.closed_at);
  if(!cl.length){b.innerHTML='<div class="empty"><span>🗓</span>NO DATA</div>';return;}

  const months=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const map={};
  cl.forEach(t=>{
    const d=new Date(t.closed_at);if(isNaN(d))return;
    const pnl=tradePnL(t);
    if(pnl===null)return;
    const k=`${d.getFullYear()}-${d.getMonth()}`;
    map[k]=(map[k]||0)+pnl;
  });
  const years=[...new Set(cl.map(t=>new Date(t.closed_at).getFullYear()).filter(y=>!isNaN(y)))].sort();
  const vals=Object.values(map);
  const maxA=Math.max(...vals.map(Math.abs),.01);
  const tip=document.getElementById('tip');

  let html='<div class="heat-grid">';
  html+='<div class="hg-lbl"></div>'+months.map(m=>`<div class="hg-head">${m}</div>`).join('');
  years.forEach(yr=>{
    html+=`<div class="hg-lbl">${yr}</div>`;
    for(let m=0;m<12;m++){
      const v=map[`${yr}-${m}`];
      let bg='var(--surface2)';
      if(v!==undefined){
        const i=Math.abs(v)/maxA;
        bg=v>=0?`rgba(34,197,94,${.1+i*.75})`:`rgba(239,68,68,${.1+i*.75})`;
      }
      const label=v!==undefined?`${yr} ${months[m]}  ${fmtEur(v,2)}`:`${yr} ${months[m]}  —`;
      html+=`<div class="hg-cell" style="background:${bg}" data-tip="${label}"></div>`;
    }
  });
  html+='</div>';
  b.innerHTML=html;

  b.querySelectorAll('.hg-cell').forEach(c=>{
    c.addEventListener('mousemove',e=>{
      tip.textContent=c.dataset.tip;
      tip.style.left=e.clientX+12+'px';tip.style.top=e.clientY-6+'px';tip.style.opacity=1;
    });
    c.addEventListener('mouseleave',()=>{tip.style.opacity=0});
  });
}

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtP(n){return(+n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(s){if(!s)return '—';const d=new Date(s);return isNaN(d)?'—':`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}

// Latest known price for a trade from daily_checks
function latestCheckPrice(trade_id){
  const checks=allChecks.filter(c=>c.trade_id===trade_id&&c.day_close!=null);
  if(!checks.length) return null;
  checks.sort((a,b)=>new Date(b.checked_at)-new Date(a.checked_at));
  return +checks[0].day_close;
}

// Current value of a single trade position (what it's worth now)
// Usa la misma lógica que la equity curve:
//   BULLISH → shares × price
//   BEARISH → shares × (2×entry − price)   [simétrico respecto a entry]
function tradeCurrentValue(t){
  const entry=+t.entry_price||0;
  const invested=+t.invested_amount||0;
  const status=t.status;
  const dir=(t.direction||'BULLISH').toUpperCase();

  if(status==='PENDING') return invested||null;
  if(!entry||!invested) return null;
  const shares=invested/entry;

  function val(price){
    if(!price) return null;
    return dir==='BEARISH' ? shares*(2*entry-price) : shares*price;
  }

  if(status==='GREEN') return val(+t.close_price||0);
  if(status==='RED')   return val(+t.stop_loss||0);
  if(status==='OPEN')  return val(livePrice[t.ticker]||latestCheckPrice(t.id));
  return null;
}

// Per-trade P&L = currentValue − invested_amount
function tradePnL(t){
  const cv=tradeCurrentValue(t);
  if(cv===null) return null;
  const invested=+t.invested_amount||0;
  if(!invested) return null;
  return cv-invested;
}

// Total portfolio P&L — copia exacta del loop día a día de index.html
// Devuelve portfolioArr[last] − capitalArr[last]  (= el +60.73 de hoy)
function totalPortfolioPnL(){
  const tradesWithInv=allTrades.filter(t=>
    t.invested_amount!=null&&+t.invested_amount>0&&
    t.entry_price!=null&&+t.entry_price>0
  );
  if(!allCapital.length&&!tradesWithInv.length) return null;

  function pd(s){if(!s)return null;const p=s.substring(0,10).split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
  const today=new Date();today.setHours(0,0,0,0);

  // Earliest date
  let firstDate=new Date(today);
  for(const c of allCapital){const d=pd(c.fecha);if(d&&d<firstDate)firstDate=d;}
  for(const t of tradesWithInv){const d=pd(t.recommended_at);if(d&&d<firstDate)firstDate=d;}

  const capEntries=allCapital.map(c=>({date:pd(c.fecha),monto:+c.monto}));

  const tradeInfo=tradesWithInv.map(t=>{
    const numShares=+t.invested_amount/+t.entry_price;
    const openDate=pd(t.recommended_at);
    const closeDate=t.closed_at?pd(t.closed_at):null;
    const parsedChecks=allChecks
      .filter(c=>c.trade_id===t.id)
      .map(c=>({date:pd(c.checked_at),close:+c.day_close}))
      .sort((a,b)=>a.date-b.date);
    return{...t,numShares,openDate,closeDate,parsedChecks};
  });

  function isOpenOnDay(t,day){
    if(!t.openDate||t.openDate>day)return false;
    const isClosed=t.status==='GREEN'||t.status==='RED';
    if(!isClosed)return true;
    if(!t.closeDate)return true;
    return t.closeDate>day;
  }
  function getLatestClose(t,day){
    const valid=t.parsedChecks.filter(c=>c.date&&c.date<=day);
    return valid.length?valid[valid.length-1].close:+t.entry_price;
  }

  let lastCapital=0, lastPortfolio=0;

  for(let d=new Date(firstDate);d<=today;d.setDate(d.getDate()+1)){
    const cur=new Date(d);
    const dow=cur.getDay();
    if(dow===0||dow===6)continue; // skip weekends

    // Capital acumulado
    let capital=0;
    for(const ce of capEntries){if(ce.date&&ce.date<=cur)capital+=ce.monto;}

    // Realized P&L de trades cerrados
    let realizedPnL=0;
    for(const t of tradeInfo){
      if(!t.closeDate||t.closeDate>cur)continue;
      if(t.openDate>cur)continue;
      if((t.status==='GREEN'||t.status==='RED')&&t.close_price!=null){
        const dir=(t.direction||'BULLISH').toUpperCase();
        realizedPnL+=dir==='BEARISH'
          ?t.numShares*(+t.entry_price-+t.close_price)
          :t.numShares*(+t.close_price-+t.entry_price);
      }
    }

    // Open trades
    const openTrades=tradeInfo.filter(t=>isOpenOnDay(t,cur));
    const lockedMoney=openTrades.reduce((s,t)=>s+(+t.invested_amount),0);
    const openValue=openTrades.reduce((s,t)=>{
      const latest=getLatestClose(t,cur);
      const dir=(t.direction||'BULLISH').toUpperCase();
      return s+(dir==='BEARISH'?t.numShares*(2*+t.entry_price-latest):t.numShares*latest);
    },0);

    const cash=capital+realizedPnL-lockedMoney;
    const portfolio=cash+openValue;

    lastCapital=capital;
    lastPortfolio=portfolio;
  }

  if(!lastCapital) return null;
  return +(lastPortfolio-lastCapital).toFixed(2);
}

// Format monetary value with € sign and 0 decimals
function fmtEur(n,decimals=0){
  if(n===null||isNaN(n))return '—';
  const abs=Math.abs(n);
  const s=abs>=1000?(abs/1000).toFixed(1)+'k':abs.toFixed(decimals);
  return (n>=0?'+':'-')+'€'+s;
}

  dot.className=''; if(cls)dot.classList.add(cls);
}

// TRADE DETAIL PANEL
// ══════════════════════════════════════════════════
let detailChart=null;

function openTradeDetail(t){
  // Remember position of existing detail widget if open
  const old=document.getElementById('w-detail');
  let dx=null, dy=null;
  if(old){
    dx=+old.style.left.replace('px','');
    dy=+old.style.top.replace('px','');
    if(detailChart){detailChart.destroy();detailChart=null;}
    old.remove();
  }

  // Default position: right of op log (w04) using CSS values only
  if(dx===null){
    const w04=document.getElementById('w04');
    dx=w04?(parseInt(w04.style.left)+parseInt(w04.style.width)+20):1460;
    dy=w04?+w04.style.top.replace('px',''):190;
  }

  const checks=allChecks
    .filter(c=>c.trade_id===t.id&&c.day_close!=null)
    .sort((a,b)=>new Date(a.checked_at)-new Date(b.checked_at));

  const pnl=tradePnL(t);
  const dir=(t.direction||'BULLISH').toUpperCase();
  const entry=+t.entry_price||0;
  const sl=+t.stop_loss||0;
  const takeProfitTarget=+t.take_profit||0;  // objetivo marcado
  const cierre=+t.close_price||0;            // precio real de cierre
  const invested=+t.invested_amount||0;
  const shares=entry&&invested?invested/entry:0;

  // Metrics
  const daysOpen=(()=>{
    const a=t.recommended_at?new Date(t.recommended_at):null;
    const b=t.closed_at?new Date(t.closed_at):new Date();
    return a?Math.round((b-a)/(1000*60*60*24)):null;
  })();

  // Max adverse excursion (worst close vs entry)
  let maxAdverse=0;
  checks.forEach(c=>{
    const price=+c.day_close;
    const adverse=dir==='BEARISH'?(price-entry)/entry*100:(entry-price)/entry*100;
    if(adverse>maxAdverse)maxAdverse=adverse;
  });

  // Near miss SL: closest % the price got to stop loss
  let nearMissPct=null, nearMissVal=null;
  if(sl&&checks.length){
    checks.forEach(c=>{
      const low=+(c.day_low||c.day_close);
      const high=+(c.day_high||c.day_close);
      const checkPrice=dir==='BEARISH'?high:low;
      const distPct=dir==='BEARISH'
        ?(checkPrice-sl)/Math.abs(entry-sl)*100
        :(sl-checkPrice)/Math.abs(entry-sl)*100; // 0%=hit sl, 100%=at entry
      if(nearMissPct===null||distPct<nearMissPct){
        nearMissPct=distPct;
        nearMissVal=dir==='BEARISH'?checkPrice-sl:sl-checkPrice;
      }
    });
  }

  // Daily volatility avg
  let avgVol=null;
  const volDays=checks.filter(c=>c.day_high&&c.day_low&&c.day_close);
  if(volDays.length){
    avgVol=volDays.reduce((s,c)=>s+((+c.day_high-+c.day_low)/+c.day_close*100),0)/volDays.length;
  }

  // Estimated P&L % over invested
  const pnlPct=invested&&pnl!==null?pnl/invested*100:null;

  const el=document.createElement('div');
  el.className='w'; el.id='w-detail'; el.dataset.ticker=t.ticker||'';
  el.style.cssText=`left:${dx}px;top:${dy}px;width:580px;height:600px;z-index:60;`;
  el.innerHTML=`
    <div class="w-head">
      <span class="w-id">◈</span>
      <span class="w-title">${esc(t.ticker||'—')} — TRADE DETAIL</span>
      <span class="w-status" style="cursor:pointer;color:var(--amber)" id="detail-close">✕ CLOSE</span>
    </div>
    <div class="w-body p0" style="display:flex;flex-direction:column;overflow:hidden">

      <!-- Header meta -->
      <div style="display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap">
        <span class="badge ${t.status}">${t.status}</span>
        <span style="font-size:9px;color:${dir==='BEARISH'?'var(--red)':'var(--green)'};letter-spacing:1px">${dir}</span>
        ${t.phase?`<span class="phase-lbl">${esc(t.phase)}</span>`:''}
        <span style="font-size:9px;color:var(--muted2);margin-left:auto">ID: ${t.id?t.id.slice(0,8)+'…':'—'}</span>
      </div>
      ${t.status==='OPEN'?`
      <!-- Live price bar -->
      <div id="detail-live-bar" style="display:flex;align-items:center;gap:12px;padding:7px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:rgba(245,158,11,.04)">
        <span style="font-size:8px;color:var(--amber);letter-spacing:2px">● LIVE</span>
        <span id="detail-live-price" style="font-size:13px;font-weight:700;color:var(--amber)">${livePrice[t.ticker]?'€'+fmtP(livePrice[t.ticker]):'—'}</span>
        <span id="detail-live-today" style="font-size:10px">${(()=>{
          const lp=livePrice[t.ticker],pc=livePrevClose[t.ticker];
          if(!lp||!pc) return '<span style="color:var(--muted2)">esperando datos...</span>';
          const chg=lp-pc, pct=chg/pc*100;
          return '<span style="color:var(--text)">'+fmtEur(chg,2)+' ('+(pct>=0?'+':'')+pct.toFixed(2)+'%)</span> hoy';
        })()}</span>
      </div>`:''}

      <!-- Price levels -->
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0">
        <div><div class="s-lbl">Entry</div><div style="font-size:12px;font-weight:700;color:var(--amber)">€${entry?fmtP(entry):'—'}</div></div>
        <div><div class="s-lbl">Stop Loss</div><div style="font-size:12px;font-weight:700;color:var(--red)">€${sl?fmtP(sl):'—'}</div></div>
        <div><div class="s-lbl">Take Profit</div><div style="font-size:12px;font-weight:700;color:var(--green)">€${takeProfitTarget?fmtP(takeProfitTarget):'—'}</div></div>
        <div><div class="s-lbl">Cierre</div><div style="font-size:12px;font-weight:700;color:var(--muted2)">€${cierre?fmtP(cierre):'—'}</div></div>
        <div><div class="s-lbl">P&amp;L</div><div style="font-size:12px;font-weight:700;color:${pnl===null?'var(--muted2)':pnl>=0?'var(--green)':'var(--red)'}">${pnl===null?'—':fmtEur(pnl,2)}${pnlPct!==null?' ('+( pnlPct>=0?'+':'')+pnlPct.toFixed(1)+'%)':''}</div></div>
      </div>

      <!-- Chart -->
      <div style="flex:1;padding:8px 10px;min-height:0">
        <canvas id="detail-chart-canvas"></canvas>
      </div>

      <!-- Metrics -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 12px;border-top:1px solid var(--border);flex-shrink:0">
        <div><div class="s-lbl">Max Adverse</div><div style="font-size:12px;font-weight:700;color:var(--red)">-${maxAdverse.toFixed(1)}%</div></div>
        <div><div class="s-lbl">Near Miss SL</div><div style="font-size:12px;font-weight:700;color:${nearMissPct!==null&&nearMissPct<20?'var(--red)':'var(--amber)'}">
          ${nearMissPct!==null?'€'+fmtP(Math.abs(nearMissVal||0))+' ('+Math.max(0,nearMissPct).toFixed(0)+'%)':'—'}</div></div>
        <div><div class="s-lbl">Vol. Diaria</div><div style="font-size:12px;font-weight:700;color:var(--blue)">${avgVol!==null?avgVol.toFixed(1)+'%/día':'—'}</div></div>
        <div><div class="s-lbl">Días Abierto</div><div style="font-size:12px;font-weight:700;color:var(--text)">${daysOpen!==null?daysOpen+' días':'—'}</div></div>
      </div>

      <!-- Notes -->
      ${t.notes?`<div style="padding:8px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--muted2);line-height:1.6;flex-shrink:0">
        <span style="color:var(--amber);letter-spacing:1px;font-size:8px">NOTAS  </span>${esc(t.notes)}</div>`:''}
    </div>
    <div class="corner-bl"></div><div class="corner-br"></div>`;

  world.appendChild(el);
  makeDraggable(el);

  // Close button
  el.querySelector('#detail-close').onclick=e=>{
    e.stopPropagation();
    if(detailChart){detailChart.destroy();detailChart=null;}
    el.remove();
  };

  // Draw chart — always render if we have reference prices, even without daily_checks
  if(!checks.length&&!cierre&&!entry) return;

  // Build labels + closes, append close price as final point if trade is closed
  let labels=checks.map(c=>c.checked_at.slice(0,10));
  let closes=checks.map(c=>+c.day_close);

  // Always ensure x-axis has at least 2 points so reference lines can render
  const axisStart=(t.recommended_at||new Date().toISOString()).slice(0,10);
  const axisEnd=(t.closed_at||new Date().toISOString()).slice(0,10);
  if(!labels.length||labels[0]>axisStart){labels.unshift(axisStart);closes.unshift(null);}
  if(labels[labels.length-1]<axisEnd){labels.push(axisEnd);closes.push(null);}
  if(cierre&&t.closed_at){
    const closeDate=t.closed_at.slice(0,10);
    // only add if not already the last point
    if(!labels.length||labels[labels.length-1]!==closeDate){
      labels.push(closeDate);
      closes.push(cierre);
    } else {
      closes[closes.length-1]=cierre; // overwrite last with exact close
    }
  }

  const lineColor=pnl===null?'#f59e0b':pnl>=0?'#22c55e':'#ef4444';

  requestAnimationFrame(()=>{
    const ctx=document.getElementById('detail-chart-canvas');
    if(!ctx)return;
    detailChart=new Chart(ctx,{
      type:'line',
      data:{
        labels,
        datasets:[
          {label:'Precio',data:closes,borderColor:'#22d3ee',borderWidth:1.5,
           fill:false,tension:.2,
           pointRadius:closes.map((_,i)=>i===closes.length-1?4:2),
           pointHoverRadius:4,
           pointBackgroundColor:closes.map((_,i)=>i===closes.length-1?lineColor:'#22d3ee')},
          ...(entry?[{label:'Entry',data:labels.map(()=>entry),borderColor:'#f59e0b',
            borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0}]:[]),
          ...(sl?[{label:'Stop',data:labels.map(()=>sl),borderColor:'#ef4444',
            borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0}]:[]),
          ...(takeProfitTarget?[{label:'TP',data:labels.map(()=>takeProfitTarget),borderColor:'#22c55e',
            borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0}]:[]),
        ]
      },
      options:{
        animation:false,responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'top',labels:{color:'#4a6080',font:{size:8,family:'Courier New'},boxWidth:12,padding:8}},
          tooltip:{mode:'index',intersect:false,filter:item=>item.datasetIndex===0,callbacks:{title:items=>items[0]?.label||'',label:c=>`€${fmtP(c.raw)}`}}
        },
        scales:{
          x:{ticks:{color:'#3d4a5e',font:{size:8,family:'Courier New'},maxTicksLimit:8},grid:{color:'rgba(30,37,53,.5)'},border:{display:false}},
          y:{ticks:{color:'#3d4a5e',font:{size:8,family:'Courier New'},callback:v=>'€'+fmtP(v)},grid:{color:'rgba(30,37,53,.5)'},border:{display:false}}
        }
      }
    });
  });
}

// ── PENDING DETAIL PANEL ──────────────────────────
function openPendingDetail(t){
  const old=document.getElementById('w-pending-detail');
  let dx=null,dy=null;
  if(old){dx=+old.style.left.replace('px','');dy=+old.style.top.replace('px','');old.remove();}
  if(dx===null){
    const w08=document.getElementById('w08');
    dx=w08?(parseInt(w08.style.left)+parseInt(w08.style.width)+20):1010;
    dy=w08?+w08.style.top.replace('px',''):692;
  }

  const dir=(t.direction||'BULLISH').toUpperCase();
  const entry=+t.entry_price||0;
  const sl=+t.stop_loss||0;
  const tp=+t.take_profit||0;
  const invested=+t.invested_amount||0;

  // R/R ratio
  const risk=dir==='BEARISH'?sl-entry:entry-sl;
  const reward=dir==='BEARISH'?entry-tp:tp-entry;
  const rr=(risk&&reward)?reward/risk:null;

  // Days pending
  const recDate=t.recommended_at?new Date(t.recommended_at):null;
  const daysPending=recDate?Math.round((new Date()-recDate)/(1000*60*60*24)):null;

  const el=document.createElement('div');
  el.className='w'; el.id='w-pending-detail';
  el.style.cssText=`left:${dx}px;top:${dy}px;width:400px;height:auto;z-index:60;`;
  el.innerHTML=`
    <div class="w-head">
      <span class="w-id">◈</span>
      <span class="w-title">${esc(t.ticker||'—')} — PENDING DETAIL</span>
      <span class="w-status" style="cursor:pointer;color:var(--amber)" id="pend-detail-close">✕ CLOSE</span>
    </div>
    <div class="w-body p0">

      <!-- Header meta -->
      <div style="display:flex;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);flex-wrap:wrap">
        <span class="badge PENDING" style="background:rgba(245,158,11,.15);color:var(--amber);border-color:var(--amber-dim)">PENDING</span>
        <span style="font-size:9px;color:${dir==='BEARISH'?'var(--red)':'var(--green)'};letter-spacing:1px">${dir}</span>
        ${t.phase?`<span class="phase-lbl">${esc(t.phase)}</span>`:''}
      </div>

      <!-- Price levels -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 12px;border-bottom:1px solid var(--border)">
        <div><div class="s-lbl">Entry</div><div style="font-size:13px;font-weight:700;color:var(--amber)">${entry?'€'+fmtP(entry):'—'}</div></div>
        <div><div class="s-lbl">Stop Loss</div><div style="font-size:13px;font-weight:700;color:var(--red)">${sl?'€'+fmtP(sl):'—'}</div></div>
        <div><div class="s-lbl">Target</div><div style="font-size:13px;font-weight:700;color:var(--green)">${tp?'€'+fmtP(tp):'—'}</div></div>
        <div><div class="s-lbl">R/R</div><div style="font-size:13px;font-weight:700;color:${rr===null?'var(--muted2)':rr>=2?'var(--green)':'var(--amber)'}">${rr!==null?'1:'+rr.toFixed(2):'—'}</div></div>
      </div>

      <!-- Meta stats -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 12px;border-bottom:1px solid var(--border)">
        <div><div class="s-lbl">Recomendado</div><div style="font-size:11px;font-weight:700;color:var(--text)">${fmtDate(t.recommended_at)}</div></div>
        <div><div class="s-lbl">Días en espera</div><div style="font-size:11px;font-weight:700;color:${daysPending!==null&&daysPending>10?'var(--amber)':'var(--text)'}">${daysPending!==null?daysPending+' días':'—'}</div></div>
        <div><div class="s-lbl">Capital previsto</div><div style="font-size:11px;font-weight:700;color:var(--blue)">${invested?'€'+fmtP(invested):'—'}</div></div>
      </div>

      <!-- Notes -->
      ${t.notes?`<div style="padding:10px 12px;font-size:10px;color:var(--muted2);line-height:1.7">
        <span style="color:var(--amber);letter-spacing:1px;font-size:8px">NOTAS  </span>${esc(t.notes)}</div>`
        :'<div style="padding:10px 12px;font-size:10px;color:var(--muted)">Sin notas.</div>'}

    </div>
    <div class="corner-bl"></div><div class="corner-br"></div>`;

  world.appendChild(el);
  makeDraggable(el);
  el.querySelector('#pend-detail-close').onclick=e=>{e.stopPropagation();el.remove();};
}
